{{ define "main" }}

<section class="hero">
  <div class="container--content">
    <h1 class="hero__title">{{ .Title }}</h1>
  </div>
</section>

<section class="section--tight">
  <div class="container--content">
    <div class="tag-list" style="gap: var(--space-sm);">
      {{ range .Pages }}
        <a href="{{ .RelPermalink }}" class="tag" style="font-size: 0.875rem; padding: 6px 14px;">
          {{ .Title }}
          <span style="margin-left: 4px; opacity: 0.5;">({{ len .Pages }})</span>
        </a>
      {{ end }}
    </div>
  </div>
</section>

{{ end }}
