<header class="site-header" id="site-header">
  <div class="header-inner">

    <a href="{{ "/" | relURL }}" class="site-brand">
      <svg class="brand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <path d="M2 12h20"/>
        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
      </svg>
      {{ .Site.Title }}
      <span class="brand-tag">GIS</span>
    </a>

    <nav class="site-nav" id="site-nav" aria-label="Main navigation">
      {{ range .Site.Menus.main }}
        {{ if .HasChildren }}
        <div class="nav-dropdown">
          <a class="nav-link nav-link--has-children{{ if $.IsMenuCurrent "main" . }} active{{ end }}"
             href="{{ .URL | relURL }}">
            {{ .Name }}
            <svg class="nav-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          </a>
          <div class="nav-dropdown__menu">
            {{ range .Children }}
            <a class="nav-dropdown__item" href="{{ .URL | relURL }}">{{ .Name }}</a>
            {{ end }}
          </div>
        </div>
        {{ else }}
        <a class="nav-link{{ if $.IsMenuCurrent "main" . }} active{{ end }}"
           href="{{ .URL | relURL }}">
          {{ .Name }}
        </a>
        {{ end }}
      {{ end }}
    </nav>

    <div class="header-actions">
      <button class="menu-toggle" id="menu-toggle" aria-label="Open menu" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
    </div>

  </div>
</header>
